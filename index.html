<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chub Smugglers</title>
  <link rel="icon" type="image/png" href="chub-smugglers-favicon.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated film grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: -100%;
      width: 300%;
      height: 300%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
      animation: grain 0.8s steps(1) infinite;
    }

    @keyframes grain {
      0%   { transform: translate(0px, 0px); }
      10%  { transform: translate(-20px, -40px); }
      20%  { transform: translate(-60px, 20px); }
      30%  { transform: translate(28px, -60px); }
      40%  { transform: translate(-20px, 50px); }
      50%  { transform: translate(-50px, 30px); }
      60%  { transform: translate(50px, 0px); }
      70%  { transform: translate(0px, 50px); }
      80%  { transform: translate(12px, 60px); }
      90%  { transform: translate(-40px, 40px); }
      100% { transform: translate(0px, 0px); }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem;
    }

    .logo {
      max-width: min(520px, 88vw);
      width: 100%;
      height: auto;
      display: block;
    }

    .instagram-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.25s ease;
    }

    .instagram-link:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    .instagram-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="content">
    <img src="chub-smugglers-logo.png" alt="Chub Smugglers" class="logo">
    <a href="https://www.instagram.com/chubsmugglers" target="_blank" rel="noopener noreferrer" class="instagram-link">
      <!-- Instagram icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
      </svg>
      @chubsmugglers
    </a>
  </div>
</body>
</html>
